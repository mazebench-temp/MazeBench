# Hosted Training starter config generated by the local /train page.
# The current Prime CLI accepts the published environment id here. MazeBench's
# v1 reward weights and action cap are injected per run as MAZEBENCH_* values.
name = "MazeBench"
model = "Qwen/Qwen3.5-0.8B"
max_steps = 100
batch_size = 512
rollouts_per_example = 16

[sampling]
max_tokens = 1024
temperature = 1.0

[[env]]
id = "mazebench/mazebench"
